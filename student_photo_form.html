<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Photo Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #1a3a52;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 15px;
            color: #555;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .form-section {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
        }

        .form-section h2 {
            font-size: 18px;
            color: #1a3a52;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .required {
            color: #e74c3c;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        input[type="file"] {
            padding: 8px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            padding: 8px 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: background 0.2s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: #2980b9;
        }

        .preview-container {
            margin-top: 16px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #ddd;
            text-align: center;
            display: none;
        }

        .preview-container.active {
            display: block;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .file-info {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }

        .remove-btn {
            padding: 6px 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.2s ease;
        }

        .remove-btn:hover {
            background: #c0392b;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit {
            background: #27ae60;
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            background: #229954;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(39, 174, 96, 0.2);
        }

        .btn-submit:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .btn-reset:hover {
            background: #d5dbdc;
        }

        .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 6px;
        }

        .success {
            background: #d5f4e6;
            color: #27ae60;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #27ae60;
            display: none;
        }

        .success.show {
            display: block;
        }

        .entries-section {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
        }

        .entries-section h2 {
            font-size: 18px;
            color: #1a3a52;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .entry-count {
            background: #ecf0f1;
            color: #2c3e50;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .entries-list {
            display: grid;
            gap: 16px;
        }

        .entry-item {
            padding: 16px;
            border: 1px solid #ecf0f1;
            border-radius: 8px;
            background: #f8f9fa;
            transition: all 0.2s ease;
        }

        .entry-item:hover {
            border-color: #bdc3c7;
            background: white;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .entry-name {
            font-weight: 600;
            color: #1a3a52;
            font-size: 15px;
        }

        .entry-id {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }

        .entry-timestamp {
            font-size: 12px;
            color: #95a5a6;
        }

        .entry-thumbnail {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .entry-thumbnail:hover {
            transform: scale(1.05);
        }

        .entry-delete {
            padding: 4px 8px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: background 0.2s ease;
        }

        .entry-delete:hover {
            background: #c0392b;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #95a5a6;
        }

        .empty-state p {
            font-size: 14px;
        }

        .export-controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .btn-export {
            padding: 8px 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s ease;
        }

        .btn-export:hover {
            background: #2980b9;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 0;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-body {
            padding: 24px;
            text-align: center;
        }

        .modal-body img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #ecf0f1;
            display: flex;
            gap: 12px;
        }

        .modal-footer button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .modal-close {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .modal-close:hover {
            background: #d5dbdc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Student Photo Collection</h1>
            <p>4th Year Department - Collect individual student photographs</p>
        </div>

        <div class="main-content">
            <!-- Form Section -->
            <div class="form-section">
                <h2>Student Information</h2>
                <div class="success" id="successMessage">
                    ✓ Photo submitted successfully!
                </div>

                <form id="photoForm">
                    <div class="form-group">
                        <label for="studentName">Full Name <span class="required">*</span></label>
                        <input type="text" id="studentName" name="name" placeholder="Enter full name" required>
                        <div class="error" id="nameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="studentId">Student ID / Roll Number <span class="required">*</span></label>
                        <input type="text" id="studentId" name="id" placeholder="e.g., 4MCA001" required>
                        <div class="error" id="idError"></div>
                    </div>

                    <div class="form-group">
                        <label for="photoUpload">Upload Photo <span class="required">*</span></label>
                        <input type="file" id="photoUpload" name="photo" accept="image/*" required>
                        <div class="file-info">
                            Recommended: JPG or PNG, max 15MB
                        </div>
                        <div class="error" id="photoError"></div>

                        <div class="preview-container" id="previewContainer">
                            <img id="photoPreview" alt="Photo preview">
                            <div class="file-info" id="fileDetails"></div>
                            <button type="button" class="remove-btn" onclick="removePhoto()">Remove Photo</button>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-submit">Submit Photo</button>
                        <button type="reset" class="btn btn-reset">Clear Form</button>
                    </div>
                </form>
            </div>

            <!-- Entries Section -->
            <div class="entries-section">
                <h2>
                    Submitted Entries
                    <span class="entry-count" id="entryCount">0</span>
                </h2>

                <div class="export-controls">
                    <button class="btn-export" onclick="downloadCSV()">📥 Download CSV</button>
                    <button class="btn-export" onclick="downloadZip()">📦 Download Zip</button>
                </div>

                <div class="entries-list" id="entriesList">
                    <div class="empty-state">
                        <p>No submissions yet. Fill the form to add a student.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Photo Preview -->
    <div class="modal" id="photoModal">
        <div class="modal-content">
            <div class="modal-body">
                <img id="modalImage" alt="Student photo">
                <div>
                    <p id="modalName" style="font-weight: 600; margin-bottom: 4px;"></p>
                    <p id="modalId" style="font-size: 14px; color: #666;"></p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-close" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize from localStorage
        let entries = JSON.parse(localStorage.getItem('studentPhotos')) || [];

        const form = document.getElementById('photoForm');
        const photoInput = document.getElementById('photoUpload');
        const previewContainer = document.getElementById('previewContainer');
        const photoPreview = document.getElementById('photoPreview');
        const fileDetails = document.getElementById('fileDetails');
        const successMessage = document.getElementById('successMessage');
        const entriesList = document.getElementById('entriesList');
        const entryCount = document.getElementById('entryCount');

        // Photo preview
        photoInput.addEventListener('change', function(e) {
            document.getElementById('photoError').textContent = '';

            if (this.files && this.files[0]) {
                const file = this.files[0];

                // Validate file size (15MB max)
                if (file.size > 15 * 1024 * 1024) {
                    document.getElementById('photoError').textContent = 'File size must be less than 15MB';
                    removePhoto();
                    return;
                }

                // Validate file type
                if (!file.type.startsWith('image/')) {
                    document.getElementById('photoError').textContent = 'Please upload an image file';
                    removePhoto();
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    photoPreview.src = e.target.result;
                    fileDetails.textContent = `${file.name} • ${(file.size / 1024).toFixed(1)} KB`;
                    previewContainer.classList.add('active');
                };
                reader.readAsDataURL(file);
            }
        });

        function removePhoto() {
            photoInput.value = '';
            previewContainer.classList.remove('active');
            document.getElementById('photoError').textContent = '';
        }

        // Form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('studentName').value.trim();
            const id = document.getElementById('studentId').value.trim();
            const photoFile = photoInput.files[0];

            // Validation
            let isValid = true;
            document.getElementById('nameError').textContent = '';
            document.getElementById('idError').textContent = '';
            document.getElementById('photoError').textContent = '';

            if (!name) {
                document.getElementById('nameError').textContent = 'Name is required';
                isValid = false;
            }

            if (!id) {
                document.getElementById('idError').textContent = 'Student ID is required';
                isValid = false;
            }

            if (!photoFile) {
                document.getElementById('photoError').textContent = 'Please upload a photo';
                isValid = false;
            }

            if (!isValid) return;

            // Convert file to base64
            const reader = new FileReader();
            reader.onload = function(e) {
                const entry = {
                    id: Date.now(),
                    name: name,
                    studentId: id,
                    photo: e.target.result,
                    timestamp: new Date().toLocaleString()
                };

                entries.push(entry);
                localStorage.setItem('studentPhotos', JSON.stringify(entries));

                // Reset form
                form.reset();
                removePhoto();

                // Show success message
                successMessage.classList.add('show');
                setTimeout(() => successMessage.classList.remove('show'), 3000);

                // Refresh list
                renderEntries();
            };
            reader.readAsDataURL(photoFile);
        });

        function renderEntries() {
            entryCount.textContent = entries.length;

            if (entries.length === 0) {
                entriesList.innerHTML = '<div class="empty-state"><p>No submissions yet. Fill the form to add a student.</p></div>';
                return;
            }

            entriesList.innerHTML = entries.map(entry => `
                <div class="entry-item">
                    <div class="entry-header">
                        <div>
                            <div class="entry-name">${escapeHtml(entry.name)}</div>
                            <div class="entry-id">ID: ${escapeHtml(entry.studentId)}</div>
                            <div class="entry-timestamp">${entry.timestamp}</div>
                        </div>
                        <div style="display: flex; gap: 8px; align-items: start;">
                            <img src="${entry.photo}" alt="Student photo" class="entry-thumbnail" 
                                 onclick="openModal('${escapeHtml(entry.name)}', '${escapeHtml(entry.studentId)}', '${entry.photo}')">
                            <button class="entry-delete" onclick="deleteEntry(${entry.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function deleteEntry(id) {
            if (confirm('Are you sure you want to delete this entry?')) {
                entries = entries.filter(e => e.id !== id);
                localStorage.setItem('studentPhotos', JSON.stringify(entries));
                renderEntries();
            }
        }

        function downloadCSV() {
            if (entries.length === 0) {
                alert('No entries to download');
                return;
            }

            let csv = 'Name,Student ID,Submission Time\n';
            entries.forEach(entry => {
                csv += `"${entry.name}","${entry.studentId}","${entry.timestamp}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `student_photos_${new Date().getTime()}.csv`;
            a.click();
        }

        function downloadZip() {
            alert('For downloading photos as ZIP, please use your browser\'s download feature or contact your administrator.\n\nYou can view and download individual photos by clicking on them.');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openModal(name, id, photo) {
            document.getElementById('photoModal').classList.add('active');
            document.getElementById('modalImage').src = photo;
            document.getElementById('modalName').textContent = name;
            document.getElementById('modalId').textContent = `ID: ${id}`;
        }

        function closeModal() {
            document.getElementById('photoModal').classList.remove('active');
        }

        // Close modal when clicking outside
        document.getElementById('photoModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initial render
        renderEntries();
    </script>
</body>
</html>
